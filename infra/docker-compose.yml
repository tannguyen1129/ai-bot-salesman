services:
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    depends_on:
      - api

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - ../.env
    environment:
      P1_PROCESS_ROLE: api
      P1_BOUNCE_LISTENER_ROLE: worker
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    command: ["npm", "run", "start:worker", "--workspace=@vnetwork/api"]
    env_file:
      - ../.env
    environment:
      P1_PROCESS_ROLE: worker
      P1_BOUNCE_LISTENER_ROLE: worker
      # API container handles migrations on boot; worker skips to avoid a race.
      SKIP_MIGRATE: "true"
    depends_on:
      - postgres
      - redis
      - api

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bot_salesman
      POSTGRES_PASSWORD: bot_salesman_dev
      POSTGRES_DB: bot_salesman
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
